<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Planning - StucAdmin Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Inter', sans-serif; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #f5f7fa; }
        .sidebar { background: #fff; border-right: 1px solid #e5e7eb; position: fixed; left: 0; top: 0; bottom: 0; width: 256px; display: flex; flex-direction: column; z-index: 100; transition: transform 0.3s ease; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 10px; color: #64748b; text-decoration: none; margin-bottom: 4px; }
        .nav-item:hover { background: #f1f5f9; }
        .nav-item.active { background: #6366f1; color: white; }
        .logout-btn { color: #ef4444; }
        .mobile-menu-btn { display: none; position: fixed; top: 12px; left: 12px; z-index: 200; background: #6366f1; color: white; border: none; border-radius: 10px; width: 44px; height: 44px; font-size: 20px; cursor: pointer; }
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 90; }
        .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; }
        .btn-primary { background: #6366f1; color: white; padding: 10px 20px; border-radius: 10px; font-weight: 600; border: none; cursor: pointer; min-height: 44px; }
        .btn-secondary { background: #f1f5f9; color: #475569; padding: 10px 20px; border-radius: 10px; font-weight: 600; border: none; cursor: pointer; }
        .input-field { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px 14px; width: 100%; font-size: 16px; min-height: 44px; }
        .input-field:focus { outline: none; border-color: #6366f1; }
        .project-card { background: #fff; border-left: 4px solid #6366f1; border-radius: 0 12px 12px 0; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
        .modal-content { background: white; border-radius: 16px; max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 20px; }
        .calendar-day { min-height: 80px; border: 1px solid #e5e7eb; padding: 8px; font-size: 12px; }
        .calendar-day.today { background: #eef2ff; }
        .calendar-day.other-month { background: #f8fafc; color: #94a3b8; }
        main { margin-left: 256px; padding: 24px; min-height: 100vh; }
        @media (max-width: 1024px) {
            .mobile-menu-btn { display: flex; align-items: center; justify-content: center; }
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.open { display: block; }
            main { margin-left: 0; padding: 70px 12px 24px 12px; }
            .calendar-day { min-height: 60px; padding: 4px; }
        }
    </style>
</head>
<body>
    <button class="mobile-menu-btn" onclick="toggleMenu()">☰</button>
    <div class="sidebar-overlay" onclick="toggleMenu()"></div>
    
    <div class="flex min-h-screen">
        <aside class="sidebar">
            <div class="p-6 border-b border-gray-100"><h1 class="text-xl font-bold text-indigo-600">StucAdmin</h1><p class="text-xs text-gray-400 mt-1">Professional Suite</p></div>
            <nav class="flex-1 p-4 overflow-y-auto">
                <a href="dashboard.html" class="nav-item">🏠 Dashboard</a>
                <a href="omzet.html" class="nav-item">💹 Omzet</a>
                <a href="crm.html" class="nav-item">👥 Klanten</a>
                <a href="planning.html" class="nav-item active">📅 Planning</a>
                <a href="uren.html" class="nav-item">⏱️ Uren</a>
                <a href="calculator.html" class="nav-item">🧮 Calculator</a>
                <a href="materials.html" class="nav-item">📊 Inkoop Analyse</a>
                <a href="materialen-beheer.html" class="nav-item">📦 Materialen</a>
            </nav>
            <div class="p-4 border-t border-gray-100"><button onclick="logout()" class="nav-item w-full logout-btn">🚪 Uitloggen</button></div>
        </aside>

        <main class="flex-1">
            <header class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
                <div><h1 class="text-lg sm:text-xl font-bold">📅 Planning</h1><p class="text-gray-500 text-sm">Beheer je projecten</p></div>
                <button onclick="openNieuwProject()" class="btn-primary text-sm">+ Nieuw project</button>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2">
                    <div class="card p-4 mb-4">
                        <div class="flex justify-between items-center mb-4">
                            <button onclick="vorigeMaand()" class="btn-secondary text-sm">◀</button>
                            <h2 class="font-bold" id="maandTitel">December 2024</h2>
                            <button onclick="volgendeMaand()" class="btn-secondary text-sm">▶</button>
                        </div>
                        <div class="grid grid-cols-7 gap-1 text-center text-xs text-gray-500 mb-2">
                            <div>Ma</div><div>Di</div><div>Wo</div><div>Do</div><div>Vr</div><div>Za</div><div>Zo</div>
                        </div>
                        <div class="grid grid-cols-7 gap-1" id="kalender"></div>
                    </div>
                </div>

                <div>
                    <h2 class="font-bold mb-4 text-sm">📋 Komende projecten</h2>
                    <div id="projectenLijst"></div>
                </div>
            </div>
        </main>
    </div>

    <div id="projectModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="flex justify-between mb-4"><h2 class="font-bold">Nieuw project</h2><button onclick="sluitModal()" class="text-gray-400 text-2xl">&times;</button></div>
            <form onsubmit="saveProject(event)" class="space-y-4">
                <input type="hidden" id="projectId">
                <div><label class="text-xs text-gray-500">Projectnaam</label><input type="text" id="projectNaam" class="input-field" required></div>
                <div><label class="text-xs text-gray-500">Klant</label><input type="text" id="projectKlant" class="input-field"></div>
                <div><label class="text-xs text-gray-500">Adres</label><input type="text" id="projectAdres" class="input-field"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-xs text-gray-500">Startdatum</label><input type="date" id="projectStart" class="input-field" required></div>
                    <div><label class="text-xs text-gray-500">Einddatum</label><input type="date" id="projectEind" class="input-field"></div>
                </div>
                <div><label class="text-xs text-gray-500">Notities</label><textarea id="projectNotities" class="input-field" rows="3"></textarea></div>
                <div class="flex gap-3">
                    <button type="submit" class="btn-primary flex-1">💾 Opslaan</button>
                    <button type="button" onclick="verwijderProject()" class="btn-secondary text-red-500" id="btnVerwijder" style="display:none">🗑️</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let projecten = JSON.parse(localStorage.getItem('stuc_planning') || '[]');
        let huidigeDatum = new Date();

        function toggleMenu() { document.querySelector('.sidebar').classList.toggle('open'); document.querySelector('.sidebar-overlay').classList.toggle('open'); }
        async function logout() { await fetch('/api/auth/logout', { method: 'POST' }); window.location.href = '/login.html'; }

        function renderKalender() {
            const jaar = huidigeDatum.getFullYear();
            const maand = huidigeDatum.getMonth();
            const maanden = ['Januari','Februari','Maart','April','Mei','Juni','Juli','Augustus','September','Oktober','November','December'];
            document.getElementById('maandTitel').textContent = maanden[maand] + ' ' + jaar;

            const eersteDag = new Date(jaar, maand, 1);
            const laatsteDag = new Date(jaar, maand + 1, 0);
            let startDag = eersteDag.getDay() || 7;
            startDag--;

            const vandaag = new Date();
            let html = '';
            
            for (let i = 0; i < startDag; i++) {
                const d = new Date(jaar, maand, -startDag + i + 1);
                html += `<div class="calendar-day other-month rounded">${d.getDate()}</div>`;
            }

            for (let dag = 1; dag <= laatsteDag.getDate(); dag++) {
                const datum = new Date(jaar, maand, dag);
                const isVandaag = datum.toDateString() === vandaag.toDateString();
                const dagProjecten = projecten.filter(p => {
                    const start = new Date(p.startDatum);
                    const eind = p.eindDatum ? new Date(p.eindDatum) : start;
                    return datum >= start && datum <= eind;
                });
                
                html += `<div class="calendar-day ${isVandaag ? 'today' : ''} rounded cursor-pointer hover:bg-indigo-50" onclick="openDag('${datum.toISOString()}')">
                    <div class="font-semibold ${isVandaag ? 'text-indigo-600' : ''}">${dag}</div>
                    ${dagProjecten.slice(0, 2).map(p => `<div class="text-xs bg-indigo-100 text-indigo-700 rounded px-1 mt-1 truncate">${p.naam}</div>`).join('')}
                    ${dagProjecten.length > 2 ? `<div class="text-xs text-gray-400">+${dagProjecten.length - 2}</div>` : ''}
                </div>`;
            }

            document.getElementById('kalender').innerHTML = html;
        }

        function renderProjecten() {
            const komend = projecten.filter(p => new Date(p.startDatum) >= new Date()).sort((a, b) => new Date(a.startDatum) - new Date(b.startDatum));
            document.getElementById('projectenLijst').innerHTML = komend.length === 0 
                ? '<p class="text-gray-400 text-sm text-center py-8">Geen projecten gepland</p>'
                : komend.map(p => `<div class="project-card" onclick="openProject('${p.id}')">
                    <h3 class="font-semibold text-sm">${p.naam}</h3>
                    <p class="text-gray-500 text-xs">${p.klant || ''}</p>
                    <p class="text-indigo-600 text-xs mt-2">📅 ${new Date(p.startDatum).toLocaleDateString('nl-NL')}</p>
                </div>`).join('');
        }

        function vorigeMaand() { huidigeDatum.setMonth(huidigeDatum.getMonth() - 1); renderKalender(); }
        function volgendeMaand() { huidigeDatum.setMonth(huidigeDatum.getMonth() + 1); renderKalender(); }

        function openNieuwProject() {
            document.getElementById('projectId').value = '';
            document.getElementById('projectNaam').value = '';
            document.getElementById('projectKlant').value = '';
            document.getElementById('projectAdres').value = '';
            document.getElementById('projectStart').value = new Date().toISOString().split('T')[0];
            document.getElementById('projectEind').value = '';
            document.getElementById('projectNotities').value = '';
            document.getElementById('btnVerwijder').style.display = 'none';
            document.getElementById('projectModal').classList.remove('hidden');
        }

        function openProject(id) {
            const p = projecten.find(x => x.id === id);
            if (!p) return;
            document.getElementById('projectId').value = p.id;
            document.getElementById('projectNaam').value = p.naam;
            document.getElementById('projectKlant').value = p.klant || '';
            document.getElementById('projectAdres').value = p.adres || '';
            document.getElementById('projectStart').value = p.startDatum;
            document.getElementById('projectEind').value = p.eindDatum || '';
            document.getElementById('projectNotities').value = p.notities || '';
            document.getElementById('btnVerwijder').style.display = 'block';
            document.getElementById('projectModal').classList.remove('hidden');
        }

        function openDag(datum) {
            document.getElementById('projectStart').value = datum.split('T')[0];
            openNieuwProject();
            document.getElementById('projectStart').value = datum.split('T')[0];
        }

        function saveProject(e) {
            e.preventDefault();
            const id = document.getElementById('projectId').value;
            const project = {
                id: id || Date.now().toString(),
                naam: document.getElementById('projectNaam').value,
                klant: document.getElementById('projectKlant').value,
                adres: document.getElementById('projectAdres').value,
                startDatum: document.getElementById('projectStart').value,
                eindDatum: document.getElementById('projectEind').value,
                notities: document.getElementById('projectNotities').value
            };
            if (id) {
                projecten = projecten.map(p => p.id === id ? project : p);
            } else {
                projecten.push(project);
            }
            localStorage.setItem('stuc_planning', JSON.stringify(projecten));
            sluitModal();
            renderKalender();
            renderProjecten();
        }

        function verwijderProject() {
            const id = document.getElementById('projectId').value;
            if (confirm('Project verwijderen?')) {
                projecten = projecten.filter(p => p.id !== id);
                localStorage.setItem('stuc_planning', JSON.stringify(projecten));
                sluitModal();
                renderKalender();
                renderProjecten();
            }
        }

        function sluitModal() { document.getElementById('projectModal').classList.add('hidden'); }

        renderKalender();
        renderProjecten();
    </script>
</body>
</html>
