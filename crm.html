<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Klanten - StucAdmin Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Inter', sans-serif; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #f5f7fa; }
        .sidebar { background: #fff; border-right: 1px solid #e5e7eb; position: fixed; left: 0; top: 0; bottom: 0; width: 256px; display: flex; flex-direction: column; z-index: 100; transition: transform 0.3s ease; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 10px; color: #64748b; text-decoration: none; margin-bottom: 4px; }
        .nav-item:hover { background: #f1f5f9; }
        .nav-item.active { background: #6366f1; color: white; }
        .logout-btn { color: #ef4444; }
        .logout-btn:hover { background: #fef2f2; }
        .mobile-menu-btn { display: none; position: fixed; top: 12px; left: 12px; z-index: 200; background: #6366f1; color: white; border: none; border-radius: 10px; width: 44px; height: 44px; font-size: 20px; cursor: pointer; }
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 90; }
        .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; }
        .kpi-card { position: relative; overflow: hidden; }
        .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--accent, #6366f1); }
        .kpi-value { font-size: 1.75rem; font-weight: 800; color: var(--accent, #6366f1); }
        .btn-primary { background: #6366f1; color: white; padding: 10px 20px; border-radius: 10px; font-weight: 600; border: none; cursor: pointer; min-height: 44px; }
        .btn-secondary { background: #f1f5f9; color: #475569; padding: 10px 20px; border-radius: 10px; font-weight: 600; border: none; cursor: pointer; min-height: 44px; }
        .input-field { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px 14px; width: 100%; font-size: 16px; min-height: 44px; }
        .input-field:focus { outline: none; border-color: #6366f1; }
        .klant-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; cursor: pointer; transition: all 0.2s; }
        .klant-card:hover { border-color: #6366f1; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .badge-green { background: #ecfdf5; color: #059669; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
        .modal-content { background: white; border-radius: 16px; max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 20px; }
        main { margin-left: 256px; padding: 24px; min-height: 100vh; }
        @media (max-width: 1024px) {
            .mobile-menu-btn { display: flex; align-items: center; justify-content: center; }
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.open { display: block; }
            main { margin-left: 0; padding: 70px 12px 24px 12px; }
            .kpi-value { font-size: 1.25rem; }
        }
    </style>
</head>
<body>
    <button class="mobile-menu-btn" onclick="toggleMenu()">☰</button>
    <div class="sidebar-overlay" onclick="toggleMenu()"></div>
    
    <div class="flex min-h-screen">
        <aside class="sidebar">
            <div class="p-4 border-b border-gray-100"><img src="/logo-stucologie.jpg" alt="Stucologie B.V." style="max-width: 180px; height: auto;"></div>
            <nav class="flex-1 p-4 overflow-y-auto">
                <a href="dashboard.html" class="nav-item">🏠 Dashboard</a>
                <a href="omzet.html" class="nav-item">💹 Omzet</a>
                <a href="crm.html" class="nav-item active">👥 Klanten</a>
                <a href="planning.html" class="nav-item">📅 Planning</a>
                <a href="uren.html" class="nav-item">⏱️ Uren</a>
                <a href="calculator.html" class="nav-item">🧮 Calculator</a>
                <a href="materials.html" class="nav-item">📊 Inkoop Analyse</a>
                <a href="materialen-beheer.html" class="nav-item">📦 Materialen</a>
            </nav>
            <div class="p-4 border-t border-gray-100"><button onclick="logout()" class="nav-item w-full logout-btn">🚪 Uitloggen</button></div>
        </aside>

        <main class="flex-1">
            <header class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
                <div><h1 class="text-lg sm:text-xl font-bold">👥 Klanten CRM</h1><p class="text-gray-500 text-sm">Beheer je klantrelaties</p></div>
                <div class="flex gap-2 flex-wrap">
                    <input type="text" id="zoek" class="input-field w-full sm:w-48" placeholder="🔍 Zoeken..." onkeyup="filterKlanten()">
                    <button onclick="openNieuw()" class="btn-primary text-sm">+ Nieuwe klant</button>
                </div>
            </header>

            <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-6">
                <div class="card kpi-card p-4" style="--accent: #6366f1"><p class="text-gray-500 text-xs">Totaal</p><p class="kpi-value" id="kpiTotaal">0</p></div>
                <div class="card kpi-card p-4" style="--accent: #10b981"><p class="text-gray-500 text-xs">Actief</p><p class="kpi-value" id="kpiActief">0</p></div>
                <div class="card kpi-card p-4" style="--accent: #f59e0b"><p class="text-gray-500 text-xs">Omzet</p><p class="kpi-value" id="kpiOmzet">€0</p></div>
                <div class="card kpi-card p-4" style="--accent: #8b5cf6"><p class="text-gray-500 text-xs">Gem/klant</p><p class="kpi-value" id="kpiGem">€0</p></div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4" id="klantenGrid"></div>
        </main>
    </div>

    <div id="klantModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="flex justify-between mb-4"><h2 class="font-bold text-lg" id="modalTitle">Klant</h2><button onclick="sluitModal()" class="text-gray-400 text-2xl">&times;</button></div>
            <form onsubmit="saveKlant(event)" class="space-y-4">
                <input type="hidden" id="klantId">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div><label class="text-xs text-gray-500">Bedrijfsnaam</label><input type="text" id="bedrijf" class="input-field"></div>
                    <div><label class="text-xs text-gray-500">Contactpersoon</label><input type="text" id="contact" class="input-field"></div>
                    <div><label class="text-xs text-gray-500">Email</label><input type="email" id="email" class="input-field"></div>
                    <div><label class="text-xs text-gray-500">Telefoon</label><input type="tel" id="telefoon" class="input-field"></div>
                    <div class="sm:col-span-2"><label class="text-xs text-gray-500">Adres</label><input type="text" id="adres" class="input-field"></div>
                    <div><label class="text-xs text-gray-500">Postcode</label><input type="text" id="postcode" class="input-field"></div>
                    <div><label class="text-xs text-gray-500">Plaats</label><input type="text" id="plaats" class="input-field"></div>
                </div>
                <div><label class="text-xs text-gray-500">Notities</label><textarea id="notities" class="input-field" rows="3"></textarea></div>
                <div class="flex gap-3"><button type="submit" class="btn-primary flex-1">💾 Opslaan</button><button type="button" onclick="sluitModal()" class="btn-secondary">Annuleren</button></div>
            </form>
        </div>
    </div>

    <script>
        let contacts = [], invoices = [];
        function toggleMenu() { document.querySelector('.sidebar').classList.toggle('open'); document.querySelector('.sidebar-overlay').classList.toggle('open'); }
        async function logout() { await fetch('/api/auth/logout', { method: 'POST' }); window.location.href = '/login.html'; }

        async function init() {
            try {
                [contacts, invoices] = await Promise.all([fetch('/api/contacts').then(r => r.json()), fetch('/api/invoices').then(r => r.json())]);
                renderKlanten(); updateKPIs();
            } catch (e) { console.error(e); }
        }

        function updateKPIs() {
            document.getElementById('kpiTotaal').textContent = contacts.length;
            const actief = contacts.filter(c => invoices.some(i => i.contact_id === c.id)).length;
            document.getElementById('kpiActief').textContent = actief;
            const omzet = invoices.reduce((s, i) => s + parseFloat(i.total_price_incl_tax || 0), 0);
            document.getElementById('kpiOmzet').textContent = '€' + omzet.toLocaleString('nl-NL', {maximumFractionDigits: 0});
            document.getElementById('kpiGem').textContent = contacts.length ? '€' + Math.round(omzet / contacts.length) : '€0';
        }

        function renderKlanten() {
            const zoek = document.getElementById('zoek').value.toLowerCase();
            const filtered = contacts.filter(c => {
                const naam = (c.company_name || c.firstname + ' ' + c.lastname || '').toLowerCase();
                return naam.includes(zoek);
            });
            document.getElementById('klantenGrid').innerHTML = filtered.map(c => {
                const omzet = invoices.filter(i => i.contact_id === c.id).reduce((s, i) => s + parseFloat(i.total_price_incl_tax || 0), 0);
                return `<div class="klant-card" onclick="openKlant('${c.id}')">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="font-semibold text-sm">${c.company_name || c.firstname + ' ' + c.lastname || 'Onbekend'}</h3>
                        <span class="badge badge-green text-xs">€${omzet.toFixed(0)}</span>
                    </div>
                    <p class="text-gray-500 text-xs">${c.email || ''}</p>
                    <p class="text-gray-400 text-xs">${c.city || ''}</p>
                </div>`;
            }).join('') || '<p class="text-gray-400 col-span-full text-center py-8">Geen klanten gevonden</p>';
        }

        function filterKlanten() { renderKlanten(); }

        function openNieuw() {
            document.getElementById('modalTitle').textContent = 'Nieuwe klant';
            document.getElementById('klantId').value = '';
            document.getElementById('bedrijf').value = '';
            document.getElementById('contact').value = '';
            document.getElementById('email').value = '';
            document.getElementById('telefoon').value = '';
            document.getElementById('adres').value = '';
            document.getElementById('postcode').value = '';
            document.getElementById('plaats').value = '';
            document.getElementById('notities').value = '';
            document.getElementById('klantModal').classList.remove('hidden');
        }

        function openKlant(id) {
            const c = contacts.find(x => x.id === id);
            if (!c) return;
            document.getElementById('modalTitle').textContent = 'Klant bewerken';
            document.getElementById('klantId').value = c.id;
            document.getElementById('bedrijf').value = c.company_name || '';
            document.getElementById('contact').value = (c.firstname || '') + ' ' + (c.lastname || '');
            document.getElementById('email').value = c.email || '';
            document.getElementById('telefoon').value = c.phone || '';
            document.getElementById('adres').value = c.address1 || '';
            document.getElementById('postcode').value = c.zipcode || '';
            document.getElementById('plaats').value = c.city || '';
            document.getElementById('notities').value = '';
            document.getElementById('klantModal').classList.remove('hidden');
        }

        async function saveKlant(e) {
            e.preventDefault();
            const id = document.getElementById('klantId').value;
            const naam = document.getElementById('contact').value.split(' ');
            const data = {
                contact: {
                    company_name: document.getElementById('bedrijf').value,
                    firstname: naam[0] || '',
                    lastname: naam.slice(1).join(' ') || '',
                    email: document.getElementById('email').value,
                    phone: document.getElementById('telefoon').value,
                    address1: document.getElementById('adres').value,
                    zipcode: document.getElementById('postcode').value,
                    city: document.getElementById('plaats').value,
                    country: 'NL'
                }
            };
            try {
                if (id) {
                    await fetch('/api/contacts/' + id, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                } else {
                    await fetch('/api/contacts', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                }
                sluitModal(); init();
            } catch (e) { alert('Fout bij opslaan'); }
        }

        function sluitModal() { document.getElementById('klantModal').classList.add('hidden'); }
        init();
    </script>
</body>
</html>
