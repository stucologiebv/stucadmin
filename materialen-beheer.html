<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Materialen - StucAdmin Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Inter', sans-serif; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #f5f7fa; }
        .sidebar { background: #fff; border-right: 1px solid #e5e7eb; position: fixed; left: 0; top: 0; bottom: 0; width: 256px; display: flex; flex-direction: column; z-index: 100; transition: transform 0.3s ease; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 10px; color: #64748b; text-decoration: none; margin-bottom: 4px; }
        .nav-item:hover { background: #f1f5f9; }
        .nav-item.active { background: #6366f1; color: white; }
        .logout-btn { color: #ef4444; }
        .mobile-menu-btn { display: none; position: fixed; top: 12px; left: 12px; z-index: 200; background: #6366f1; color: white; border: none; border-radius: 10px; width: 44px; height: 44px; font-size: 20px; cursor: pointer; }
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 90; }
        .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; }
        .btn-primary { background: #6366f1; color: white; padding: 10px 20px; border-radius: 10px; font-weight: 600; border: none; cursor: pointer; min-height: 44px; }
        .btn-secondary { background: #f1f5f9; color: #475569; padding: 10px 16px; border-radius: 10px; font-weight: 600; border: none; cursor: pointer; min-height: 44px; }
        .btn-success { background: #dcfce7; color: #15803d; padding: 8px 12px; border-radius: 8px; border: none; cursor: pointer; }
        .input-field { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px 14px; width: 100%; font-size: 16px; min-height: 44px; }
        .input-field:focus { outline: none; border-color: #6366f1; }
        .tab { padding: 10px 16px; border-radius: 10px; cursor: pointer; font-weight: 500; font-size: 14px; }
        .tab.active { background: #6366f1; color: white; }
        .mat-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
        .modal-content { background: white; border-radius: 16px; max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 20px; }
        main { margin-left: 256px; padding: 24px; min-height: 100vh; }
        @media (max-width: 1024px) {
            .mobile-menu-btn { display: flex; align-items: center; justify-content: center; }
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.open { display: block; }
            main { margin-left: 0; padding: 70px 12px 24px 12px; }
        }
    </style>
</head>
<body>
    <button class="mobile-menu-btn" onclick="toggleMenu()">☰</button>
    <div class="sidebar-overlay" onclick="toggleMenu()"></div>
    
    <div class="flex min-h-screen">
        <aside class="sidebar">
            <div class="p-6 border-b border-gray-100"><h1 class="text-xl font-bold text-indigo-600">StucAdmin</h1><p class="text-xs text-gray-400 mt-1">Professional Suite</p></div>
            <nav class="flex-1 p-4 overflow-y-auto">
                <a href="dashboard.html" class="nav-item">🏠 Dashboard</a>
                <a href="omzet.html" class="nav-item">💹 Omzet</a>
                <a href="crm.html" class="nav-item">👥 Klanten</a>
                <a href="planning.html" class="nav-item">📅 Planning</a>
                <a href="uren.html" class="nav-item">⏱️ Uren</a>
                <a href="calculator.html" class="nav-item">🧮 Calculator</a>
                <a href="materials.html" class="nav-item">📊 Inkoop Analyse</a>
                <a href="materialen-beheer.html" class="nav-item active">📦 Materialen</a>
            </nav>
            <div class="p-4 border-t border-gray-100"><button onclick="logout()" class="nav-item w-full logout-btn">🚪 Uitloggen</button></div>
        </aside>

        <main class="flex-1">
            <header class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
                <div><h1 class="text-lg sm:text-xl font-bold">📦 Materialen Beheer</h1><p class="text-gray-500 text-sm">Database met <span id="aantalMat">0</span> materialen</p></div>
                <button onclick="openNieuw()" class="btn-primary text-sm">+ Nieuw materiaal</button>
            </header>

            <div class="flex gap-2 mb-4 flex-wrap">
                <div class="tab active" onclick="setTab('database')">📋 Database</div>
                <div class="tab" onclick="setTab('categorie')">📁 Categorieën</div>
            </div>

            <div class="card p-4 mb-4">
                <div class="flex flex-col sm:flex-row gap-3">
                    <input type="text" id="zoek" class="input-field flex-1" placeholder="🔍 Zoek materiaal..." onkeyup="filter()">
                    <select id="filterCat" class="input-field sm:w-48" onchange="filter()">
                        <option value="">Alle categorieën</option>
                    </select>
                </div>
            </div>

            <div id="content">
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4" id="materialenGrid"></div>
            </div>
        </main>
    </div>

    <div id="matModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="flex justify-between mb-4"><h2 class="font-bold" id="modalTitle">Materiaal</h2><button onclick="sluitModal()" class="text-gray-400 text-2xl">&times;</button></div>
            <form onsubmit="save(event)" class="space-y-4">
                <input type="hidden" id="matId">
                <div><label class="text-xs text-gray-500">Naam</label><input type="text" id="matNaam" class="input-field" required></div>
                <div><label class="text-xs text-gray-500">Categorie</label><input type="text" id="matCat" class="input-field" list="catList"></div>
                <datalist id="catList"></datalist>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-xs text-gray-500">Prijs</label><input type="number" id="matPrijs" class="input-field" step="0.01"></div>
                    <div><label class="text-xs text-gray-500">Eenheid</label><input type="text" id="matEenheid" class="input-field" placeholder="stuk, kg, m²"></div>
                </div>
                <div><label class="text-xs text-gray-500">Leverancier</label><input type="text" id="matLev" class="input-field"></div>
                <div class="flex gap-3">
                    <button type="submit" class="btn-primary flex-1">💾 Opslaan</button>
                    <button type="button" onclick="verwijder()" class="btn-secondary text-red-500" id="btnDel" style="display:none">🗑️</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let materialen = JSON.parse(localStorage.getItem('stuc_materialen_db') || '[]');
        let activeTab = 'database';

        function toggleMenu() { document.querySelector('.sidebar').classList.toggle('open'); document.querySelector('.sidebar-overlay').classList.toggle('open'); }
        async function logout() { await fetch('/api/auth/logout', { method: 'POST' }); window.location.href = '/login.html'; }

        function setTab(tab) {
            activeTab = tab;
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === (tab === 'database' ? 0 : 1)));
            render();
        }

        function render() {
            document.getElementById('aantalMat').textContent = materialen.length;
            updateCatFilter();
            
            if (activeTab === 'database') {
                renderDatabase();
            } else {
                renderCategorieen();
            }
        }

        function updateCatFilter() {
            const cats = [...new Set(materialen.map(m => m.categorie).filter(Boolean))].sort();
            document.getElementById('filterCat').innerHTML = '<option value="">Alle categorieën</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('catList').innerHTML = cats.map(c => `<option value="${c}">`).join('');
        }

        function filter() {
            render();
        }

        function renderDatabase() {
            const zoek = document.getElementById('zoek').value.toLowerCase();
            const cat = document.getElementById('filterCat').value;
            let lijst = materialen.filter(m => {
                const matchZoek = m.naam.toLowerCase().includes(zoek);
                const matchCat = !cat || m.categorie === cat;
                return matchZoek && matchCat;
            });

            document.getElementById('content').innerHTML = `
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3" id="materialenGrid">
                    ${lijst.slice(0, 50).map(m => `
                        <div class="mat-card" onclick="openMat('${m.id}')">
                            <h3 class="font-semibold text-sm truncate">${m.naam}</h3>
                            <p class="text-gray-500 text-xs">${m.categorie || 'Geen categorie'}</p>
                            <div class="flex justify-between mt-2">
                                <span class="text-indigo-600 font-bold text-sm">€${(m.standaardPrijs || 0).toFixed(2)}</span>
                                <span class="text-gray-400 text-xs">${m.eenheid || ''}</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
                ${lijst.length > 50 ? `<p class="text-gray-400 text-center mt-4 text-sm">Toont 50 van ${lijst.length} resultaten</p>` : ''}
                ${lijst.length === 0 ? '<p class="text-gray-400 text-center py-8">Geen materialen gevonden</p>' : ''}
            `;
        }

        function renderCategorieen() {
            const cats = {};
            materialen.forEach(m => {
                const cat = m.categorie || 'Overig';
                if (!cats[cat]) cats[cat] = [];
                cats[cat].push(m);
            });

            document.getElementById('content').innerHTML = `
                <div class="space-y-4">
                    ${Object.entries(cats).sort((a, b) => a[0].localeCompare(b[0])).map(([cat, items]) => `
                        <div class="card p-4">
                            <div class="flex justify-between items-center mb-3">
                                <h3 class="font-bold text-sm">${cat}</h3>
                                <span class="text-gray-400 text-xs">${items.length} items</span>
                            </div>
                            <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-2">
                                ${items.slice(0, 8).map(m => `
                                    <div class="bg-gray-50 rounded-lg p-2 cursor-pointer hover:bg-gray-100" onclick="openMat('${m.id}')">
                                        <p class="text-xs truncate">${m.naam}</p>
                                        <p class="text-indigo-600 text-xs font-semibold">€${(m.standaardPrijs || 0).toFixed(2)}</p>
                                    </div>
                                `).join('')}
                                ${items.length > 8 ? `<div class="bg-gray-50 rounded-lg p-2 text-center text-gray-400 text-xs">+${items.length - 8} meer</div>` : ''}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function openNieuw() {
            document.getElementById('modalTitle').textContent = 'Nieuw materiaal';
            document.getElementById('matId').value = '';
            document.getElementById('matNaam').value = '';
            document.getElementById('matCat').value = '';
            document.getElementById('matPrijs').value = '';
            document.getElementById('matEenheid').value = '';
            document.getElementById('matLev').value = '';
            document.getElementById('btnDel').style.display = 'none';
            document.getElementById('matModal').classList.remove('hidden');
        }

        function openMat(id) {
            const m = materialen.find(x => String(x.id) === String(id));
            if (!m) return;
            document.getElementById('modalTitle').textContent = 'Materiaal bewerken';
            document.getElementById('matId').value = m.id;
            document.getElementById('matNaam').value = m.naam || '';
            document.getElementById('matCat').value = m.categorie || '';
            document.getElementById('matPrijs').value = m.standaardPrijs || '';
            document.getElementById('matEenheid').value = m.eenheid || '';
            document.getElementById('matLev').value = m.leverancier || '';
            document.getElementById('btnDel').style.display = 'block';
            document.getElementById('matModal').classList.remove('hidden');
        }

        function save(e) {
            e.preventDefault();
            const id = document.getElementById('matId').value;
            const mat = {
                id: id || Date.now().toString(),
                naam: document.getElementById('matNaam').value,
                categorie: document.getElementById('matCat').value,
                standaardPrijs: parseFloat(document.getElementById('matPrijs').value) || 0,
                eenheid: document.getElementById('matEenheid').value,
                leverancier: document.getElementById('matLev').value
            };
            if (id) {
                materialen = materialen.map(m => String(m.id) === String(id) ? mat : m);
            } else {
                materialen.push(mat);
            }
            localStorage.setItem('stuc_materialen_db', JSON.stringify(materialen));
            sluitModal();
            render();
        }

        function verwijder() {
            const id = document.getElementById('matId').value;
            if (confirm('Materiaal verwijderen?')) {
                materialen = materialen.filter(m => String(m.id) !== String(id));
                localStorage.setItem('stuc_materialen_db', JSON.stringify(materialen));
                sluitModal();
                render();
            }
        }

        function sluitModal() { document.getElementById('matModal').classList.add('hidden'); }

        render();
    </script>
</body>
</html>
