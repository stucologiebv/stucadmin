<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uren - StucAdmin Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Inter', sans-serif; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #f5f7fa; }
        .sidebar { background: #fff; border-right: 1px solid #e5e7eb; position: fixed; left: 0; top: 0; bottom: 0; width: 256px; display: flex; flex-direction: column; z-index: 100; transition: transform 0.3s ease; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 10px; color: #64748b; text-decoration: none; margin-bottom: 4px; }
        .nav-item:hover { background: #f1f5f9; }
        .nav-item.active { background: #6366f1; color: white; }
        .logout-btn { color: #ef4444; }
        .mobile-menu-btn { display: none; position: fixed; top: 12px; left: 12px; z-index: 200; background: #6366f1; color: white; border: none; border-radius: 10px; width: 44px; height: 44px; font-size: 20px; cursor: pointer; }
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 90; }
        .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; }
        .kpi-card { position: relative; overflow: hidden; }
        .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--accent, #6366f1); }
        .kpi-value { font-size: 1.75rem; font-weight: 800; color: var(--accent, #6366f1); }
        .btn-primary { background: #6366f1; color: white; padding: 10px 20px; border-radius: 10px; font-weight: 600; border: none; cursor: pointer; min-height: 44px; }
        .btn-secondary { background: #f1f5f9; color: #475569; padding: 10px 20px; border-radius: 10px; font-weight: 600; border: none; cursor: pointer; }
        .input-field { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px 14px; width: 100%; font-size: 16px; min-height: 44px; }
        .input-field:focus { outline: none; border-color: #6366f1; }
        .uur-row { display: grid; grid-template-columns: 1fr 1fr 80px 40px; gap: 8px; align-items: center; padding: 12px; background: #f8fafc; border-radius: 10px; margin-bottom: 8px; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
        .modal-content { background: white; border-radius: 16px; max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 20px; }
        main { margin-left: 256px; padding: 24px; min-height: 100vh; }
        @media (max-width: 1024px) {
            .mobile-menu-btn { display: flex; align-items: center; justify-content: center; }
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.open { display: block; }
            main { margin-left: 0; padding: 70px 12px 24px 12px; }
            .kpi-value { font-size: 1.25rem; }
            .uur-row { grid-template-columns: 1fr; gap: 8px; }
        }
    </style>
</head>
<body>
    <button class="mobile-menu-btn" onclick="toggleMenu()">☰</button>
    <div class="sidebar-overlay" onclick="toggleMenu()"></div>
    
    <div class="flex min-h-screen">
        <aside class="sidebar">
            <div class="p-6 border-b border-gray-100"><h1 class="text-xl font-bold text-indigo-600">StucAdmin</h1><p class="text-xs text-gray-400 mt-1">Professional Suite</p></div>
            <nav class="flex-1 p-4 overflow-y-auto">
                <a href="dashboard.html" class="nav-item">🏠 Dashboard</a>
                <a href="omzet.html" class="nav-item">💹 Omzet</a>
                <a href="crm.html" class="nav-item">👥 Klanten</a>
                <a href="planning.html" class="nav-item">📅 Planning</a>
                <a href="uren.html" class="nav-item active">⏱️ Uren</a>
                <a href="calculator.html" class="nav-item">🧮 Calculator</a>
                <a href="materials.html" class="nav-item">📊 Inkoop Analyse</a>
                <a href="materialen-beheer.html" class="nav-item">📦 Materialen</a>
            </nav>
            <div class="p-4 border-t border-gray-100"><button onclick="logout()" class="nav-item w-full logout-btn">🚪 Uitloggen</button></div>
        </aside>

        <main class="flex-1">
            <header class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
                <div><h1 class="text-lg sm:text-xl font-bold">⏱️ Urenregistratie</h1><p class="text-gray-500 text-sm">Registreer je werkuren</p></div>
                <button onclick="openNieuw()" class="btn-primary text-sm">+ Uren toevoegen</button>
            </header>

            <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-6">
                <div class="card kpi-card p-4" style="--accent: #6366f1"><p class="text-gray-500 text-xs">Vandaag</p><p class="kpi-value" id="kpiVandaag">0u</p></div>
                <div class="card kpi-card p-4" style="--accent: #10b981"><p class="text-gray-500 text-xs">Deze week</p><p class="kpi-value" id="kpiWeek">0u</p></div>
                <div class="card kpi-card p-4" style="--accent: #f59e0b"><p class="text-gray-500 text-xs">Deze maand</p><p class="kpi-value" id="kpiMaand">0u</p></div>
                <div class="card kpi-card p-4" style="--accent: #8b5cf6"><p class="text-gray-500 text-xs">Gem/dag</p><p class="kpi-value" id="kpiGem">0u</p></div>
            </div>

            <div class="card p-4">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-bold text-sm">📋 Recente uren</h2>
                    <input type="date" id="filterDatum" class="input-field w-auto" onchange="render()">
                </div>
                <div id="urenLijst"></div>
            </div>
        </main>
    </div>

    <div id="uurModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="flex justify-between mb-4"><h2 class="font-bold">Uren registreren</h2><button onclick="sluitModal()" class="text-gray-400 text-2xl">&times;</button></div>
            <form onsubmit="saveUur(event)" class="space-y-4">
                <input type="hidden" id="uurId">
                <div><label class="text-xs text-gray-500">Datum</label><input type="date" id="uurDatum" class="input-field" required></div>
                <div><label class="text-xs text-gray-500">Project</label><select id="uurProject" class="input-field"></select></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-xs text-gray-500">Start</label><input type="time" id="uurStart" class="input-field" required></div>
                    <div><label class="text-xs text-gray-500">Eind</label><input type="time" id="uurEind" class="input-field" required></div>
                </div>
                <div><label class="text-xs text-gray-500">Notities</label><textarea id="uurNotities" class="input-field" rows="2"></textarea></div>
                <button type="submit" class="btn-primary w-full">💾 Opslaan</button>
            </form>
        </div>
    </div>

    <script>
        let uren = JSON.parse(localStorage.getItem('stuc_uren') || '[]');
        let projecten = JSON.parse(localStorage.getItem('stuc_planning') || '[]');

        function toggleMenu() { document.querySelector('.sidebar').classList.toggle('open'); document.querySelector('.sidebar-overlay').classList.toggle('open'); }
        async function logout() { await fetch('/api/auth/logout', { method: 'POST' }); window.location.href = '/login.html'; }

        function render() {
            updateKPIs();
            const filter = document.getElementById('filterDatum').value;
            let lijst = uren.sort((a, b) => new Date(b.datum) - new Date(a.datum));
            if (filter) lijst = lijst.filter(u => u.datum === filter);

            document.getElementById('urenLijst').innerHTML = lijst.length === 0
                ? '<p class="text-gray-400 text-center py-8 text-sm">Geen uren geregistreerd</p>'
                : lijst.slice(0, 20).map(u => {
                    const proj = projecten.find(p => p.id === u.projectId);
                    return `<div class="uur-row">
                        <div><p class="font-medium text-sm">${proj?.naam || 'Geen project'}</p><p class="text-gray-500 text-xs">${new Date(u.datum).toLocaleDateString('nl-NL')}</p></div>
                        <div class="text-sm">${u.start} - ${u.eind}</div>
                        <div class="text-indigo-600 font-semibold text-sm">${berekenUren(u.start, u.eind)}u</div>
                        <button onclick="verwijder('${u.id}')" class="text-red-400 text-sm">🗑️</button>
                    </div>`;
                }).join('');
        }

        function updateKPIs() {
            const vandaag = new Date().toISOString().split('T')[0];
            const weekStart = new Date(); weekStart.setDate(weekStart.getDate() - weekStart.getDay() + 1);
            const maandStart = new Date(); maandStart.setDate(1);

            const vandaagUren = uren.filter(u => u.datum === vandaag).reduce((s, u) => s + berekenUren(u.start, u.eind), 0);
            const weekUren = uren.filter(u => new Date(u.datum) >= weekStart).reduce((s, u) => s + berekenUren(u.start, u.eind), 0);
            const maandUren = uren.filter(u => new Date(u.datum) >= maandStart).reduce((s, u) => s + berekenUren(u.start, u.eind), 0);
            const dagen = new Set(uren.map(u => u.datum)).size;
            const gemUren = dagen > 0 ? (uren.reduce((s, u) => s + berekenUren(u.start, u.eind), 0) / dagen) : 0;

            document.getElementById('kpiVandaag').textContent = vandaagUren.toFixed(1) + 'u';
            document.getElementById('kpiWeek').textContent = weekUren.toFixed(1) + 'u';
            document.getElementById('kpiMaand').textContent = maandUren.toFixed(1) + 'u';
            document.getElementById('kpiGem').textContent = gemUren.toFixed(1) + 'u';
        }

        function berekenUren(start, eind) {
            const [sh, sm] = start.split(':').map(Number);
            const [eh, em] = eind.split(':').map(Number);
            return Math.max(0, (eh * 60 + em - sh * 60 - sm) / 60);
        }

        function openNieuw() {
            document.getElementById('uurId').value = '';
            document.getElementById('uurDatum').value = new Date().toISOString().split('T')[0];
            document.getElementById('uurStart').value = '08:00';
            document.getElementById('uurEind').value = '17:00';
            document.getElementById('uurNotities').value = '';
            document.getElementById('uurProject').innerHTML = '<option value="">-- Selecteer project --</option>' +
                projecten.map(p => `<option value="${p.id}">${p.naam}</option>`).join('');
            document.getElementById('uurModal').classList.remove('hidden');
        }

        function saveUur(e) {
            e.preventDefault();
            const uur = {
                id: document.getElementById('uurId').value || Date.now().toString(),
                datum: document.getElementById('uurDatum').value,
                projectId: document.getElementById('uurProject').value,
                start: document.getElementById('uurStart').value,
                eind: document.getElementById('uurEind').value,
                notities: document.getElementById('uurNotities').value
            };
            const idx = uren.findIndex(u => u.id === uur.id);
            if (idx >= 0) uren[idx] = uur; else uren.push(uur);
            localStorage.setItem('stuc_uren', JSON.stringify(uren));
            sluitModal();
            render();
        }

        function verwijder(id) {
            if (confirm('Verwijderen?')) {
                uren = uren.filter(u => u.id !== id);
                localStorage.setItem('stuc_uren', JSON.stringify(uren));
                render();
            }
        }

        function sluitModal() { document.getElementById('uurModal').classList.add('hidden'); }
        render();
    </script>
</body>
</html>
