<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Executive Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 to-blue-900 min-h-screen p-8">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-4xl font-bold text-white">📊 Executive Dashboard</h1>
                <p class="text-blue-200 mt-2">Management Overzicht</p>
            </div>
            <div class="flex gap-3">
                <a href="materials.html" class="px-4 py-2 bg-white/10 hover:bg-white/20 text-white rounded-lg transition">← Terug</a>
                <button onclick="refreshDashboard()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition">🔄 Refresh</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-gradient-to-br from-green-500 to-green-600 rounded-2xl p-6 text-white shadow-2xl">
                <p class="text-sm opacity-90">💰 Besparingspotentieel</p>
                <p id="totalSavings" class="text-4xl font-bold mt-2">€0</p>
            </div>
            <div class="bg-gradient-to-br from-blue-500 to-blue-600 rounded-2xl p-6 text-white shadow-2xl">
                <p class="text-sm opacity-90">📈 Totale Kosten</p>
                <p id="totalCost" class="text-4xl font-bold mt-2">€0</p>
            </div>
            <div class="bg-gradient-to-br from-red-500 to-red-600 rounded-2xl p-6 text-white shadow-2xl">
                <p class="text-sm opacity-90">⚠️ Prijs Alerts</p>
                <p id="alertCount" class="text-4xl font-bold mt-2">0</p>
            </div>
            <div class="bg-gradient-to-br from-purple-500 to-purple-600 rounded-2xl p-6 text-white shadow-2xl">
                <p class="text-sm opacity-90">📄 Facturen</p>
                <p id="invoiceCount" class="text-4xl font-bold mt-2">0</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white/10 backdrop-blur-lg rounded-2xl p-6">
                <h3 class="text-xl font-bold text-white mb-4">📊 Kosten per Categorie</h3>
                <canvas id="categoryChart"></canvas>
            </div>
            <div class="bg-white/10 backdrop-blur-lg rounded-2xl p-6">
                <h3 class="text-xl font-bold text-white mb-4">🏆 Top Leveranciers</h3>
                <canvas id="suppliersChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        let charts = {};

        async function refreshDashboard() {
            try {
                const response = await fetch('http://localhost:3001/api/recommendations');
                const data = await response.json();
                
                document.getElementById('totalSavings').textContent = '€' + (data.summary?.totalPotentialSavings || 0).toLocaleString('nl-NL');
                document.getElementById('totalCost').textContent = '€' + (data.summary?.totalCost || 0).toLocaleString('nl-NL');
                document.getElementById('alertCount').textContent = data.summary?.highPriority || 0;
                document.getElementById('invoiceCount').textContent = data.summary?.totalInvoices || 0;
                
                renderCharts(data);
            } catch (error) {
                console.error('Dashboard refresh failed:', error);
            }
        }

        function renderCharts(data) {
            if (charts.category) charts.category.destroy();
            if (charts.suppliers) charts.suppliers.destroy();

            const categoryCtx = document.getElementById('categoryChart').getContext('2d');
            const categories = data.byCategory || [];
            
            charts.category = new Chart(categoryCtx, {
                type: 'doughnut',
                data: {
                    labels: categories.slice(0, 6).map(c => c.category || 'Onbekend'),
                    datasets: [{
                        data: categories.slice(0, 6).map(c => c.totalCost || 0),
                        backgroundColor: ['#3B82F6', '#10B981', '#F59E0B', '#EF4444', '#8B5CF6', '#EC4899']
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } }
                }
            });

            const suppliersCtx = document.getElementById('suppliersChart').getContext('2d');
            const suppliers = data.bySupplier || [];
            
            charts.suppliers = new Chart(suppliersCtx, {
                type: 'bar',
                data: {
                    labels: suppliers.slice(0, 5).map(s => s.supplier?.substring(0, 15) || 'Onbekend'),
                    datasets: [{
                        label: 'Uitgegeven',
                        data: suppliers.slice(0, 5).map(s => s.totalCost || 0),
                        backgroundColor: '#8B5CF6'
                    }]
                },
                options: {
                    responsive: true,
                    indexAxis: 'y',
                    plugins: { legend: { labels: { color: '#fff' } } },
                    scales: {
                        y: { ticks: { color: '#fff' }, grid: { color: 'rgba(255,255,255,0.1)' } },
                        x: { ticks: { color: '#fff', callback: v => '€' + v.toLocaleString() }, grid: { color: 'rgba(255,255,255,0.1)' } }
                    }
                }
            });
        }

        window.onload = refreshDashboard;
    </script>
</body>
</html>
