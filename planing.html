<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📅 Werkplanning - Stukadoorsbedrijf</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-50 min-h-screen p-4">
<div class="max-w-7xl mx-auto space-y-6">

    <!-- HEADER -->
    <div class="bg-gradient-to-r from-blue-600 to-cyan-600 rounded-2xl shadow-2xl p-6 text-white">
        <div class="flex items-center justify-between flex-wrap gap-4">
            <div class="flex items-center gap-4">
                <div class="bg-white/20 p-3 rounded-xl text-4xl">📅</div>
                <div>
                    <h1 class="text-3xl font-bold">Werkplanning</h1>
                    <p class="text-blue-100">Plan projecten en medewerkers</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="openNieuwProject()" class="px-4 py-2 bg-green-500 hover:bg-green-600 rounded-lg font-bold">+ Nieuw Project</button>
                <a href="materials.html" class="px-4 py-2 bg-white/20 hover:bg-white/30 rounded-lg">← Dashboard</a>
            </div>
        </div>
    </div>

    <!-- WEEK NAVIGATIE -->
    <div class="bg-white rounded-xl shadow-lg p-4">
        <div class="flex justify-between items-center">
            <button onclick="vorigeWeek()" class="px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded-lg">← Vorige week</button>
            <div class="text-center">
                <h2 class="text-2xl font-bold" id="weekTitel">Week 1</h2>
                <p class="text-gray-600" id="weekDatum">1 - 7 januari 2025</p>
            </div>
            <button onclick="volgendeWeek()" class="px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded-lg">Volgende week →</button>
        </div>
    </div>

    <!-- KALENDER GRID -->
    <div class="bg-white rounded-xl shadow-lg p-6">
        <div class="grid grid-cols-7 gap-2 mb-4">
            <div class="text-center font-bold text-gray-600 py-2">Maandag</div>
            <div class="text-center font-bold text-gray-600 py-2">Dinsdag</div>
            <div class="text-center font-bold text-gray-600 py-2">Woensdag</div>
            <div class="text-center font-bold text-gray-600 py-2">Donderdag</div>
            <div class="text-center font-bold text-gray-600 py-2">Vrijdag</div>
            <div class="text-center font-bold text-gray-600 py-2 text-orange-600">Zaterdag</div>
            <div class="text-center font-bold text-gray-600 py-2 text-red-600">Zondag</div>
        </div>
        <div class="grid grid-cols-7 gap-2" id="kalenderGrid">
            <!-- Wordt gevuld door JS -->
        </div>
    </div>

    <!-- PROJECTEN DEZE WEEK -->
    <div class="bg-white rounded-xl shadow-lg p-6">
        <h3 class="text-xl font-bold mb-4">📋 Projecten deze week</h3>
        <div id="projectenLijst" class="space-y-3">
            <!-- Wordt gevuld door JS -->
        </div>
    </div>

    <!-- MEDEWERKERS -->
    <div class="bg-white rounded-xl shadow-lg p-6">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-xl font-bold">👷 Medewerkers</h3>
            <button onclick="openNieuweMedewerker()" class="px-3 py-1 bg-blue-600 text-white rounded-lg text-sm">+ Toevoegen</button>
        </div>
        <div id="medewerkersList" class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <!-- Wordt gevuld door JS -->
        </div>
    </div>
</div>

<!-- NIEUW PROJECT MODAL -->
<div id="projectModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-xl shadow-2xl max-w-lg w-full p-6">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-2xl font-bold">📋 Nieuw Project</h2>
            <button onclick="sluitModal('projectModal')" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
        </div>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Projectnaam / Klant</label>
                <input type="text" id="projectNaam" class="w-full px-4 py-2 border rounded-lg" placeholder="Bijv. Familie Jansen">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Adres</label>
                <input type="text" id="projectAdres" class="w-full px-4 py-2 border rounded-lg" placeholder="Straat, Plaats">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Startdatum</label>
                    <input type="date" id="projectStart" class="w-full px-4 py-2 border rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Einddatum</label>
                    <input type="date" id="projectEind" class="w-full px-4 py-2 border rounded-lg">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Medewerker(s)</label>
                <select id="projectMedewerker" class="w-full px-4 py-2 border rounded-lg" multiple>
                    <!-- Wordt gevuld door JS -->
                </select>
                <p class="text-xs text-gray-500 mt-1">Ctrl+klik voor meerdere</p>
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Type werk</label>
                <select id="projectType" class="w-full px-4 py-2 border rounded-lg">
                    <option value="stucen">Stucen</option>
                    <option value="sierpleister">Sierpleister</option>
                    <option value="sauzen">Sauzen</option>
                    <option value="reparatie">Reparatie</option>
                    <option value="nieuwbouw">Nieuwbouw</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Kleur</label>
                <div class="flex gap-2">
                    <label class="cursor-pointer"><input type="radio" name="kleur" value="#3B82F6" checked class="hidden peer"><span class="block w-8 h-8 rounded-full bg-blue-500 peer-checked:ring-4 ring-blue-300"></span></label>
                    <label class="cursor-pointer"><input type="radio" name="kleur" value="#10B981" class="hidden peer"><span class="block w-8 h-8 rounded-full bg-green-500 peer-checked:ring-4 ring-green-300"></span></label>
                    <label class="cursor-pointer"><input type="radio" name="kleur" value="#F59E0B" class="hidden peer"><span class="block w-8 h-8 rounded-full bg-yellow-500 peer-checked:ring-4 ring-yellow-300"></span></label>
                    <label class="cursor-pointer"><input type="radio" name="kleur" value="#EF4444" class="hidden peer"><span class="block w-8 h-8 rounded-full bg-red-500 peer-checked:ring-4 ring-red-300"></span></label>
                    <label class="cursor-pointer"><input type="radio" name="kleur" value="#8B5CF6" class="hidden peer"><span class="block w-8 h-8 rounded-full bg-purple-500 peer-checked:ring-4 ring-purple-300"></span></label>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Notities</label>
                <textarea id="projectNotities" class="w-full px-4 py-2 border rounded-lg" rows="2" placeholder="Extra info..."></textarea>
            </div>
            <button onclick="saveProject()" class="w-full py-3 bg-green-600 text-white rounded-lg font-bold hover:bg-green-700">
                💾 Opslaan
            </button>
        </div>
    </div>
</div>

<!-- MEDEWERKER MODAL -->
<div id="medewerkerModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-xl shadow-2xl max-w-md w-full p-6">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-2xl font-bold">👷 Nieuwe Medewerker</h2>
            <button onclick="sluitModal('medewerkerModal')" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
        </div>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Naam</label>
                <input type="text" id="medewerkerNaam" class="w-full px-4 py-2 border rounded-lg" placeholder="Volledige naam">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Telefoon</label>
                <input type="tel" id="medewerkerTelefoon" class="w-full px-4 py-2 border rounded-lg" placeholder="06-12345678">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Functie</label>
                <select id="medewerkerFunctie" class="w-full px-4 py-2 border rounded-lg">
                    <option value="stukadoor">Stukadoor</option>
                    <option value="leerling">Leerling</option>
                    <option value="voorman">Voorman</option>
                </select>
            </div>
            <button onclick="saveMedewerker()" class="w-full py-3 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700">
                💾 Opslaan
            </button>
        </div>
    </div>
</div>

<script>
// Data
let projecten = JSON.parse(localStorage.getItem('stuc_planning_projecten') || '[]');
let medewerkers = JSON.parse(localStorage.getItem('stuc_planning_medewerkers') || '[{"id":1,"naam":"Jezelf","telefoon":"","functie":"voorman"}]');
let huidigeWeekStart = getWeekStart(new Date());

function getWeekStart(date) {
    const d = new Date(date);
    const day = d.getDay();
    const diff = d.getDate() - day + (day === 0 ? -6 : 1);
    return new Date(d.setDate(diff));
}

function formatDate(date) {
    return date.toISOString().split('T')[0];
}

function formatDateNL(date) {
    return date.toLocaleDateString('nl-NL', { day: 'numeric', month: 'long' });
}

function getWeekNumber(date) {
    const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    const dayNum = d.getUTCDay() || 7;
    d.setUTCDate(d.getUTCDate() + 4 - dayNum);
    const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
    return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

function vorigeWeek() {
    huidigeWeekStart.setDate(huidigeWeekStart.getDate() - 7);
    renderKalender();
}

function volgendeWeek() {
    huidigeWeekStart.setDate(huidigeWeekStart.getDate() + 7);
    renderKalender();
}

function renderKalender() {
    const weekNr = getWeekNumber(huidigeWeekStart);
    const weekEind = new Date(huidigeWeekStart);
    weekEind.setDate(weekEind.getDate() + 6);
    
    document.getElementById('weekTitel').textContent = `Week ${weekNr}`;
    document.getElementById('weekDatum').textContent = `${formatDateNL(huidigeWeekStart)} - ${formatDateNL(weekEind)}`;
    
    const grid = document.getElementById('kalenderGrid');
    grid.innerHTML = '';
    
    for (let i = 0; i < 7; i++) {
        const dag = new Date(huidigeWeekStart);
        dag.setDate(dag.getDate() + i);
        const dagStr = formatDate(dag);
        const isVandaag = dagStr === formatDate(new Date());
        
        // Vind projecten voor deze dag
        const dagProjecten = projecten.filter(p => {
            return dagStr >= p.startDatum && dagStr <= p.eindDatum;
        });
        
        const cell = document.createElement('div');
        cell.className = `min-h-[120px] border rounded-lg p-2 ${isVandaag ? 'bg-blue-50 border-blue-400' : 'bg-gray-50'} ${i >= 5 ? 'bg-gray-100' : ''}`;
        cell.innerHTML = `
            <div class="text-sm font-bold ${isVandaag ? 'text-blue-600' : 'text-gray-700'}">${dag.getDate()}</div>
            <div class="space-y-1 mt-1">
                ${dagProjecten.map(p => `
                    <div class="text-xs p-1 rounded text-white truncate cursor-pointer" style="background-color: ${p.kleur}" onclick="editProject(${p.id})" title="${p.naam}">
                        ${p.naam}
                    </div>
                `).join('')}
            </div>
        `;
        grid.appendChild(cell);
    }
    
    renderProjectenLijst();
}

function renderProjectenLijst() {
    const weekEind = new Date(huidigeWeekStart);
    weekEind.setDate(weekEind.getDate() + 6);
    const startStr = formatDate(huidigeWeekStart);
    const eindStr = formatDate(weekEind);
    
    const weekProjecten = projecten.filter(p => {
        return p.eindDatum >= startStr && p.startDatum <= eindStr;
    });
    
    const lijst = document.getElementById('projectenLijst');
    
    if (weekProjecten.length === 0) {
        lijst.innerHTML = '<p class="text-gray-500 text-center py-4">Geen projecten deze week</p>';
        return;
    }
    
    lijst.innerHTML = weekProjecten.map(p => {
        const medewerkerNamen = p.medewerkers.map(id => {
            const m = medewerkers.find(m => m.id === id);
            return m ? m.naam : 'Onbekend';
        }).join(', ');
        
        return `
            <div class="flex items-center justify-between p-4 border rounded-lg hover:bg-gray-50">
                <div class="flex items-center gap-4">
                    <div class="w-4 h-4 rounded-full" style="background-color: ${p.kleur}"></div>
                    <div>
                        <p class="font-bold">${p.naam}</p>
                        <p class="text-sm text-gray-600">📍 ${p.adres}</p>
                        <p class="text-sm text-gray-500">👷 ${medewerkerNamen || 'Niemand toegewezen'}</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-sm">${p.startDatum} - ${p.eindDatum}</p>
                    <p class="text-xs text-gray-500">${p.type}</p>
                    <button onclick="verwijderProject(${p.id})" class="text-red-500 text-xs hover:underline mt-1">Verwijderen</button>
                </div>
            </div>
        `;
    }).join('');
}

function renderMedewerkers() {
    const lijst = document.getElementById('medewerkersList');
    lijst.innerHTML = medewerkers.map(m => `
        <div class="p-4 border rounded-lg bg-gray-50">
            <p class="font-bold">${m.naam}</p>
            <p class="text-sm text-gray-600">${m.functie}</p>
            <p class="text-xs text-gray-500">${m.telefoon || 'Geen telefoon'}</p>
        </div>
    `).join('');
    
    // Update medewerker select in modal
    const select = document.getElementById('projectMedewerker');
    select.innerHTML = medewerkers.map(m => `<option value="${m.id}">${m.naam}</option>`).join('');
}

function openNieuwProject() {
    document.getElementById('projectNaam').value = '';
    document.getElementById('projectAdres').value = '';
    document.getElementById('projectStart').value = formatDate(new Date());
    document.getElementById('projectEind').value = formatDate(new Date());
    document.getElementById('projectNotities').value = '';
    document.getElementById('projectModal').classList.remove('hidden');
}

function openNieuweMedewerker() {
    document.getElementById('medewerkerNaam').value = '';
    document.getElementById('medewerkerTelefoon').value = '';
    document.getElementById('medewerkerModal').classList.remove('hidden');
}

function sluitModal(id) {
    document.getElementById(id).classList.add('hidden');
}

function saveProject() {
    const naam = document.getElementById('projectNaam').value.trim();
    const adres = document.getElementById('projectAdres').value.trim();
    const start = document.getElementById('projectStart').value;
    const eind = document.getElementById('projectEind').value;
    const type = document.getElementById('projectType').value;
    const notities = document.getElementById('projectNotities').value;
    const kleur = document.querySelector('input[name="kleur"]:checked').value;
    
    const selectEl = document.getElementById('projectMedewerker');
    const medewerkerIds = Array.from(selectEl.selectedOptions).map(o => parseInt(o.value));
    
    if (!naam || !start || !eind) {
        alert('Vul naam en datums in');
        return;
    }
    
    const project = {
        id: Date.now(),
        naam,
        adres,
        startDatum: start,
        eindDatum: eind,
        type,
        notities,
        kleur,
        medewerkers: medewerkerIds
    };
    
    projecten.push(project);
    localStorage.setItem('stuc_planning_projecten', JSON.stringify(projecten));
    
    sluitModal('projectModal');
    renderKalender();
}

function verwijderProject(id) {
    if (confirm('Project verwijderen?')) {
        projecten = projecten.filter(p => p.id !== id);
        localStorage.setItem('stuc_planning_projecten', JSON.stringify(projecten));
        renderKalender();
    }
}

function saveMedewerker() {
    const naam = document.getElementById('medewerkerNaam').value.trim();
    const telefoon = document.getElementById('medewerkerTelefoon').value.trim();
    const functie = document.getElementById('medewerkerFunctie').value;
    
    if (!naam) {
        alert('Vul een naam in');
        return;
    }
    
    medewerkers.push({
        id: Date.now(),
        naam,
        telefoon,
        functie
    });
    
    localStorage.setItem('stuc_planning_medewerkers', JSON.stringify(medewerkers));
    sluitModal('medewerkerModal');
    renderMedewerkers();
}

// Init
window.onload = () => {
    renderKalender();
    renderMedewerkers();
};
</script>
</body>
</html>
